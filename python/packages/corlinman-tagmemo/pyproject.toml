[project]
name = "corlinman-tagmemo"
version = "0.1.0"
description = "EPA projection + Residual Pyramid recall-quality features for tag memory."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "numpy>=1.26",
    "scikit-learn>=1.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_tagmemo"]
