# Prometheus config consumed by ops/docker-compose.observability.yml (S7.T2).
# Mirrors docker/compose/prometheus.yml; the two files can diverge if needed
# without affecting each other.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: corlinman
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:6005"]
        labels:
          service: corlinman
          component: gateway
